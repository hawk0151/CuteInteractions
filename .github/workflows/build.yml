name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Verify Java version
        run: java -version

      - name: Build with Maven
        run: mvn -B clean package

      - name: Verify JAR output
        run: ls -la target/CuteInteractions-*.jar

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: CuteInteractions-jar
          path: target/CuteInteractions-*.jar
          if-no-files-found: error
